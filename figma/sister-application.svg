<svg xmlns="http://www.w3.org/2000/svg" width="390" height="844" viewBox="0 0 390 844">
  <defs>
    <linearGradient id="fadeBottom" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0A0E1A" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0A0E1A" stop-opacity="1"/>
    </linearGradient>
    <clipPath id="screen">
      <rect width="390" height="844" rx="0"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="390" height="844" fill="#0A0E1A"/>

  <!-- Status bar -->
  <text x="24" y="22" font-size="12" font-weight="600" fill="#E8D7B5" font-family="system-ui, -apple-system, sans-serif">9:41</text>
  <text x="352" y="22" font-size="12" fill="#E8D7B5" font-family="system-ui, -apple-system, sans-serif" text-anchor="end">●●● ▲ 100%</text>

  <!-- Back button -->
  <text x="24" y="76" font-size="16" font-weight="600" fill="#C9A961" font-family="system-ui, -apple-system, sans-serif">← Back</text>

  <!-- Title -->
  <text x="24" y="126" font-size="32" font-weight="700" font-style="italic" fill="#C9A961" font-family="Georgia, 'Times New Roman', serif">Sister Application</text>

  <!-- Subtitle -->
  <text x="24" y="154" font-size="16" fill="#E8D7B5" font-family="system-ui, -apple-system, sans-serif">Create your account to get started</text>

  <!-- Wali toggle card -->
  <rect x="24" y="182" width="342" height="84" rx="12" fill="#F2CC66" fill-opacity="0.05" stroke="#F2CC66" stroke-opacity="0.2" stroke-width="1"/>
  <text x="40" y="208" font-size="14" font-weight="500" fill="#E8D7B5" font-family="system-ui, -apple-system, sans-serif">Applying on behalf of a sister</text>
  <text x="40" y="228" font-size="12" fill="#7B8799" font-style="italic" font-family="system-ui, -apple-system, sans-serif">I am registering for myself</text>
  <!-- Switch track (off) -->
  <rect x="298" y="207" width="48" height="26" rx="13" fill="#7B8799"/>
  <!-- Switch thumb (left = off) -->
  <circle cx="311" cy="220" r="10" fill="#E7EAF0"/>

  <!-- Divider -->
  <line x1="24" y1="290" x2="366" y2="290" stroke="#F2CC66" stroke-opacity="0.3" stroke-width="1"/>

  <!-- First Name -->
  <text x="24" y="318" font-size="14" font-weight="500" fill="#E8D7B5" font-family="system-ui, -apple-system, sans-serif">First Name *</text>
  <rect x="24" y="328" width="342" height="48" rx="8" fill="#1A1F2E" stroke="#C9A961" stroke-opacity="0.3" stroke-width="1"/>
  <text x="40" y="357" font-size="15" fill="#7B8799" font-family="system-ui, -apple-system, sans-serif">Enter your first name</text>

  <!-- Last Name -->
  <text x="24" y="402" font-size="14" font-weight="500" fill="#E8D7B5" font-family="system-ui, -apple-system, sans-serif">Last Name *</text>
  <rect x="24" y="412" width="342" height="48" rx="8" fill="#1A1F2E" stroke="#C9A961" stroke-opacity="0.3" stroke-width="1"/>
  <text x="40" y="441" font-size="15" fill="#7B8799" font-family="system-ui, -apple-system, sans-serif">Enter your last name</text>

  <!-- Nationality picker -->
  <text x="24" y="486" font-size="14" font-weight="500" fill="#E8D7B5" font-family="system-ui, -apple-system, sans-serif">Nationality *</text>
  <rect x="24" y="496" width="342" height="48" rx="8" fill="#1A1F2E" stroke="#C9A961" stroke-opacity="0.3" stroke-width="1"/>
  <text x="40" y="525" font-size="15" fill="#7B8799" font-family="system-ui, -apple-system, sans-serif">Select your nationality</text>
  <text x="354" y="527" font-size="22" fill="#7B8799" font-family="system-ui, -apple-system, sans-serif" text-anchor="end">›</text>

  <!-- Email -->
  <text x="24" y="570" font-size="14" font-weight="500" fill="#E8D7B5" font-family="system-ui, -apple-system, sans-serif">Email *</text>
  <rect x="24" y="580" width="342" height="48" rx="8" fill="#1A1F2E" stroke="#C9A961" stroke-opacity="0.3" stroke-width="1"/>
  <text x="40" y="609" font-size="15" fill="#7B8799" font-family="system-ui, -apple-system, sans-serif">your.email@example.com</text>

  <!-- Phone Number -->
  <text x="24" y="654" font-size="14" font-weight="500" fill="#E8D7B5" font-family="system-ui, -apple-system, sans-serif">Phone Number *</text>
  <rect x="24" y="664" width="342" height="48" rx="8" fill="#1A1F2E" stroke="#C9A961" stroke-opacity="0.3" stroke-width="1"/>
  <text x="40" y="693" font-size="15" fill="#7B8799" font-family="system-ui, -apple-system, sans-serif">+1 234 567 8900</text>

  <!-- Date of Birth -->
  <text x="24" y="738" font-size="14" font-weight="500" fill="#E8D7B5" font-family="system-ui, -apple-system, sans-serif">Date of Birth *</text>
  <text x="24" y="755" font-size="12" fill="#7B8799" font-style="italic" font-family="system-ui, -apple-system, sans-serif">Format: YYYY-MM-DD</text>
  <rect x="24" y="765" width="342" height="48" rx="8" fill="#1A1F2E" stroke="#C9A961" stroke-opacity="0.3" stroke-width="1"/>
  <text x="40" y="794" font-size="15" fill="#7B8799" font-family="system-ui, -apple-system, sans-serif">1990-01-15</text>

  <!-- Scroll fade -->
  <rect x="0" y="800" width="390" height="44" fill="url(#fadeBottom)"/>
</svg>
