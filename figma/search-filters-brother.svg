  <line x1="0" y1="756" x2="390" y2="756" stroke="#E7EAF0" stroke-width="1"/>
  <text x="195" y="778" font-size="13" fill="#7B8799" font-family="system-ui, -apple-system, sans-serif" text-anchor="middle">11 profiles match your filters</text>
  <rect x="28" y="788" width="334" height="48" rx="8" fill="#070A12"/>
  <text x="195" y="818" font-size="16" font-weight="700" fill="#F2CC66" font-family="system-ui, -apple-system, sans-serif" text-anchor="middle">Apply Filters</text>

  <!-- Home indicator -->
  <rect x="155" y="836" width="80" height="4" rx="2" fill="#070A12" fill-opacity="0.15"/>

