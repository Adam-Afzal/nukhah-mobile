<svg xmlns="http://www.w3.org/2000/svg" width="390" height="844" viewBox="0 0 390 844">

  <defs>
    <linearGradient id="fadeSister" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F7F8FB" stop-opacity="0"/>
      <stop offset="100%" stop-color="#F7F8FB" stop-opacity="1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="390" height="844" fill="#F7F8FB"/>

  <!-- Status bar -->
  <text x="28" y="18" font-size="12" font-weight="600" fill="#070A12" font-family="system-ui, -apple-system, sans-serif">9:41</text>
  <text x="362" y="18" font-size="12" fill="#070A12" font-family="system-ui, -apple-system, sans-serif" text-anchor="end">●●● 100%</text>

  <!-- ── Filter Header (white) ── -->
  <rect x="0" y="0" width="390" height="140" fill="#FFFFFF"/>
  <line x1="0" y1="140" x2="390" y2="140" stroke="#E7EAF0" stroke-width="1"/>
  <text x="28" y="72" font-size="16" font-weight="600" fill="#F2CC66" font-family="system-ui, -apple-system, sans-serif">← Back</text>
  <text x="28" y="116" font-size="28" font-weight="700" fill="#070A12" font-family="system-ui, -apple-system, sans-serif">Search</text>

  <!-- ── Search bar ── -->
  <rect x="28" y="156" width="334" height="44" rx="8" fill="#F7F8FB" stroke="#E7EAF0" stroke-width="1"/>
  <circle cx="48" cy="178" r="6" stroke="#7B8799" stroke-width="1.5" fill="none"/>
  <line x1="52" y1="182" x2="56" y2="186" stroke="#7B8799" stroke-width="1.5" stroke-linecap="round"/>
  <text x="66" y="183" font-size="15" fill="#C0C7D1" font-family="system-ui, -apple-system, sans-serif">Search by username, country, or city...</text>

  <!-- ── Active filters: 3 ── -->
  <circle cx="40" cy="224" r="12" fill="#F2CC66"/>
  <text x="40" y="228" font-size="11" font-weight="700" fill="#070A12" font-family="system-ui" text-anchor="middle">3</text>
  <text x="62" y="228" font-size="14" font-weight="700" fill="#F2CC66" font-family="system-ui, -apple-system, sans-serif">Clear All</text>

  <!-- ══════════════════════════════════════ -->
  <!-- LOCATION                               -->
  <!-- ══════════════════════════════════════ -->
  <text x="28" y="256" font-size="12" font-weight="700" fill="#7B8799" font-family="system-ui, -apple-system, sans-serif" letter-spacing="0.5">LOCATION</text>
  <rect x="28" y="270" width="334" height="82" rx="12" fill="#F7F8FB" stroke="#E7EAF0" stroke-width="1"/>

  <text x="44" y="294" font-size="13" font-weight="700" fill="#070A12" font-family="system-ui, -apple-system, sans-serif">Country</text>
  <!-- UK — selected -->
  <rect x="44" y="302" width="140" height="34" rx="8" fill="#FFFFFF" stroke="#F2CC66" stroke-width="2"/>
  <text x="62" y="324" font-size="14" font-family="system-ui">🇬🇧</text>
  <text x="82" y="324" font-size="14" fill="#070A12" font-family="system-ui, -apple-system, sans-serif">United Kingdom</text>
  <!-- US — not selected -->
  <rect x="192" y="302" width="120" height="34" rx="8" fill="#FFFFFF" stroke="#E7EAF0" stroke-width="2"/>
  <text x="208" y="324" font-size="14" font-family="system-ui">🇺🇸</text>
  <text x="228" y="324" font-size="14" fill="#070A12" font-family="system-ui, -apple-system, sans-serif">United States</text>

