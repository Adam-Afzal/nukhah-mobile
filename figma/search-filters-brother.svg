  <rect x="28" y="756" width="334" height="56" rx="12" fill="#F7F8FB" stroke="#E7EAF0" stroke-width="1"/>
  <rect x="44" y="768" width="96" height="28" rx="6" fill="#FFFFFF" stroke="#E7EAF0" stroke-width="1"/>
  <text x="92" y="786" font-size="12" fill="#7B8799" font-family="system-ui, -apple-system, sans-serif" text-anchor="middle">Never Married</text>
  <rect x="148" y="768" width="60" height="28" rx="6" fill="#FFFFFF" stroke="#E7EAF0" stroke-width="1"/>
  <text x="178" y="786" font-size="12" fill="#7B8799" font-family="system-ui, -apple-system, sans-serif" text-anchor="middle">Divorced</text>
  <rect x="216" y="768" width="58" height="28" rx="6" fill="#FFFFFF" stroke="#E7EAF0" stroke-width="1"/>
  <text x="245" y="786" font-size="12" fill="#7B8799" font-family="system-ui, -apple-system, sans-serif" text-anchor="middle">Widowed</text>

  <!-- Scroll fade into footer -->
