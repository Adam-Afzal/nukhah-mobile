  <text x="156" y="456" font-size="12" fill="#7B8799" font-family="system-ui, -apple-system, sans-serif" text-anchor="middle">Curvaceous</text>
  <rect x="202" y="438" width="72" height="28" rx="6" fill="#FFFFFF" stroke="#E7EAF0" stroke-width="1"/>
  <text x="238" y="456" font-size="12" fill="#7B8799" font-family="system-ui, -apple-system, sans-serif" text-anchor="middle">Hourglass</text>
