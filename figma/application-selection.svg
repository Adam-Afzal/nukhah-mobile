<svg xmlns="http://www.w3.org/2000/svg" width="390" height="844" viewBox="0 0 390 844">

  <!-- Background -->
  <rect width="390" height="844" fill="#0A0E1A"/>

  <!-- Status bar -->
  <text x="28" y="22" font-size="12" font-weight="600" fill="#E8D7B5" font-family="system-ui, -apple-system, sans-serif">9:41</text>
  <text x="362" y="22" font-size="12" fill="#E8D7B5" font-family="system-ui, -apple-system, sans-serif" text-anchor="end">●●● ▲ 100%</text>

  <!-- Back button -->
  <text x="28" y="62" font-size="16" font-weight="600" fill="#C9A961" font-family="system-ui, -apple-system, sans-serif">← Back</text>

  <!-- Crown icon (centered, 48×46) -->
  <svg x="171" y="80" width="48" height="46" viewBox="0 0 58 56">
    <path d="M0 40 L58 40 L58 44 L0 44 Z" fill="#F2CC66"/>
    <path d="M2 20 L10 38 L48 38 L56 20 L40 32 L29 8 L18 32 Z" fill="#F2CC66"/>
    <path d="M5 24 L10 36 L15 28" stroke="#F7E099" stroke-width="2" fill="none"/>
    <path d="M43 28 L48 36 L53 24" stroke="#F7E099" stroke-width="2" fill="none"/>
    <path d="M24 16 L29 12 L34 16" stroke="#F7E099" stroke-width="2" fill="none"/>
  </svg>

  <!-- Title -->
  <text x="195" y="172" font-size="40" font-weight="700" font-style="italic" fill="#C9A961" font-family="Georgia, 'Times New Roman', serif" text-anchor="middle">Apply as...</text>

  <!-- Subtitle -->
  <text x="195" y="196" font-size="15" fill="#E8D7B5" font-family="system-ui, -apple-system, sans-serif" text-anchor="middle">Choose your application type</text>

  <!-- ── Brother card (solid gold) ── -->
  <rect x="28" y="236" width="334" height="120" rx="12" fill="#C9A961"/>

  <!-- Brother text + arrow -->
  <text x="48" y="288" font-size="28" font-weight="700" font-style="italic" fill="#0A0E1A" font-family="Georgia, 'Times New Roman', serif">Brother</text>
  <text x="48" y="310" font-size="13" fill="#1A1F2E" font-family="system-ui, -apple-system, sans-serif">Brother seeking righteous wife</text>
  <!-- Arrow -->
  <text x="342" y="298" font-size="24" fill="#0A0E1A" font-family="system-ui" text-anchor="end">→</text>

  <!-- ── Sister card (outlined, translucent gold) ── -->
  <rect x="28" y="372" width="334" height="120" rx="12" fill="#C9A961" fill-opacity="0.1" stroke="#C9A961" stroke-width="1"/>

  <!-- Sister text + arrow -->
  <text x="48" y="424" font-size="28" font-weight="700" font-style="italic" fill="#C9A961" font-family="Georgia, 'Times New Roman', serif">Sister</text>
  <text x="48" y="446" font-size="13" fill="#E8D7B5" font-family="system-ui, -apple-system, sans-serif">Sister seeking righteous husband</text>
  <!-- Arrow -->
  <text x="342" y="434" font-size="24" fill="#C9A961" font-family="system-ui" text-anchor="end">→</text>

  <!-- ── Info box ── -->
  <rect x="28" y="516" width="334" height="86" rx="8" fill="#C9A961" fill-opacity="0.08" stroke="#C9A961" stroke-opacity="0.3" stroke-width="1"/>

  <!-- Info icon circle -->
  <circle cx="50" cy="538" r="11" fill="none" stroke="#C9A961" stroke-width="2"/>
  <text x="50" y="543" font-size="13" font-weight="700" fill="#C9A961" font-family="Georgia, serif" text-anchor="middle">i</text>

  <!-- Info text -->
  <text x="72" y="535" font-size="13" font-weight="600" fill="#E8D7B5" font-family="system-ui, -apple-system, sans-serif">Important Notice</text>
  <text x="72" y="553" font-size="11" fill="#E8D7B5" font-family="system-ui, -apple-system, sans-serif">All applications are carefully reviewed to maintain</text>
  <text x="72" y="569" font-size="11" fill="#E8D7B5" font-family="system-ui, -apple-system, sans-serif">our high community standards. This process typically</text>
  <text x="72" y="585" font-size="11" fill="#E8D7B5" font-family="system-ui, -apple-system, sans-serif">takes 2–5 business days.</text>

  <!-- Footer (pushed to bottom by spacer) -->
  <text x="195" y="822" font-size="11" fill="#7B8799" font-family="system-ui, -apple-system, sans-serif" text-anchor="middle">Your information is encrypted and confidential</text>

  <!-- Home indicator -->
  <rect x="155" y="832" width="80" height="4" rx="2" fill="#E8D7B5" fill-opacity="0.15"/>

</svg>
