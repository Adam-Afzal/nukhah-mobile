<svg xmlns="http://www.w3.org/2000/svg" width="390" height="844" viewBox="0 0 390 844">

  <!-- Background -->
  <rect width="390" height="844" fill="#F7F8FB"/>

  <!-- Status bar -->
  <text x="28" y="18" font-size="12" font-weight="600" fill="#070A12" font-family="system-ui, -apple-system, sans-serif">9:41</text>
  <text x="362" y="18" font-size="12" fill="#070A12" font-family="system-ui, -apple-system, sans-serif" text-anchor="end">●●● 100%</text>

  <!-- ── Filter Header (white) ── -->
  <rect x="0" y="0" width="390" height="140" fill="#FFFFFF"/>
  <line x1="0" y1="140" x2="390" y2="140" stroke="#E7EAF0" stroke-width="1"/>

  <!-- Back button -->
  <text x="28" y="72" font-size="16" font-weight="600" fill="#F2CC66" font-family="system-ui, -apple-system, sans-serif">← Back</text>

  <!-- Title -->
  <text x="28" y="116" font-size="28" font-weight="700" fill="#070A12" font-family="system-ui, -apple-system, sans-serif">Search</text>

  <!-- ── Search bar ── -->
  <rect x="28" y="156" width="334" height="44" rx="8" fill="#F7F8FB" stroke="#E7EAF0" stroke-width="1"/>
  <!-- Search magnifier icon -->
  <circle cx="48" cy="178" r="6" stroke="#7B8799" stroke-width="1.5" fill="none"/>
  <line x1="52" y1="182" x2="56" y2="186" stroke="#7B8799" stroke-width="1.5" stroke-linecap="round"/>
  <text x="66" y="183" font-size="15" fill="#C0C7D1" font-family="system-ui, -apple-system, sans-serif">Search by username, country, or city...</text>

  <!-- ── Active filters row ── -->
  <!-- Gold badge "3" -->
  <circle cx="40" cy="224" r="12" fill="#F2CC66"/>
  <text x="40" y="228" font-size="11" font-weight="700" fill="#070A12" font-family="system-ui" text-anchor="middle">3</text>
  <!-- Clear All -->
  <text x="62" y="228" font-size="14" font-weight="700" fill="#F2CC66" font-family="system-ui, -apple-system, sans-serif">Clear All</text>

  <!-- ══════════════════════════════════════ -->
  <!-- LOCATION section                       -->
  <!-- ══════════════════════════════════════ -->
  <text x="28" y="264" font-size="12" font-weight="700" fill="#7B8799" font-family="system-ui, -apple-system, sans-serif" letter-spacing="0.5">LOCATION</text>

  <!-- Filter box -->
  <rect x="28" y="278" width="334" height="146" rx="12" fill="#F7F8FB" stroke="#E7EAF0" stroke-width="1"/>

  <!-- "Country" label -->
  <text x="44" y="304" font-size="13" font-weight="700" fill="#070A12" font-family="system-ui, -apple-system, sans-serif">Country</text>

  <!-- Country chips (horizontal scroll implied) -->
  <!-- 🇬🇧 United Kingdom — SELECTED (gold border) -->
  <rect x="44" y="312" width="140" height="34" rx="8" fill="#FFFFFF" stroke="#F2CC66" stroke-width="2"/>
  <text x="64" y="334" font-size="14" font-family="system-ui">🇬🇧</text>
  <text x="84" y="334" font-size="14" fill="#070A12" font-family="system-ui, -apple-system, sans-serif">United Kingdom</text>
  <!-- 🇺🇸 United States — not selected -->
  <rect x="192" y="312" width="120" height="34" rx="8" fill="#FFFFFF" stroke="#E7EAF0" stroke-width="2"/>
  <text x="208" y="334" font-size="14" font-family="system-ui">🇺🇸</text>
  <text x="228" y="334" font-size="14" fill="#070A12" font-family="system-ui, -apple-system, sans-serif">United States</text>

  <!-- City label + input -->
  <text x="44" y="372" font-size="13" font-weight="700" fill="#070A12" font-family="system-ui, -apple-system, sans-serif">City</text>
  <rect x="44" y="382" width="294" height="36" rx="8" fill="#FFFFFF" stroke="#E7EAF0" stroke-width="1"/>
  <text x="60" y="404" font-size="15" fill="#070A12" font-family="system-ui, -apple-system, sans-serif">Nelson</text>

  <!-- ══════════════════════════════════════ -->
  <!-- ETHNICITY section                      -->
  <!-- ══════════════════════════════════════ -->
  <text x="28" y="452" font-size="12" font-weight="700" fill="#7B8799" font-family="system-ui, -apple-system, sans-serif" letter-spacing="0.5">ETHNICITY</text>

  <rect x="28" y="466" width="334" height="58" rx="12" fill="#F7F8FB" stroke="#E7EAF0" stroke-width="1"/>
  <!-- Arab — SELECTED -->
  <rect x="44" y="478" width="56" height="34" rx="8" fill="#F2CC66" stroke="#F2CC66" stroke-width="2"/>
  <text x="72" y="499" font-size="14" fill="#070A12" font-weight="700" font-family="system-ui, -apple-system, sans-serif" text-anchor="middle">🌍 Arab</text>
  <!-- Pakistani — not selected -->
  <rect x="108" y="478" width="82" height="34" rx="8" fill="#FFFFFF" stroke="#E7EAF0" stroke-width="2"/>
  <text x="149" y="499" font-size="14" fill="#070A12" font-family="system-ui, -apple-system, sans-serif" text-anchor="middle">🌍 Pakistani</text>
  <!-- Somali — not selected -->
  <rect x="198" y="478" width="66" height="34" rx="8" fill="#FFFFFF" stroke="#E7EAF0" stroke-width="2"/>
  <text x="231" y="499" font-size="14" fill="#070A12" font-family="system-ui, -apple-system, sans-serif" text-anchor="middle">🌍 Somali</text>
  <!-- Bengali — not selected -->
  <rect x="272" y="478" width="72" height="34" rx="8" fill="#FFFFFF" stroke="#E7EAF0" stroke-width="2"/>
  <text x="308" y="499" font-size="14" fill="#070A12" font-family="system-ui, -apple-system, sans-serif" text-anchor="middle">🌍 Bengali</text>

  <!-- ══════════════════════════════════════ -->
  <!-- PHYSICAL ATTRIBUTES section            -->
  <!-- ══════════════════════════════════════ -->
  <text x="28" y="552" font-size="12" font-weight="700" fill="#7B8799" font-family="system-ui, -apple-system, sans-serif" letter-spacing="0.5">PHYSICAL ATTRIBUTES</text>

  <rect x="28" y="566" width="334" height="116" rx="12" fill="#F7F8FB" stroke="#E7EAF0" stroke-width="1"/>

  <!-- Build label -->
  <text x="44" y="590" font-size="13" font-weight="700" fill="#070A12" font-family="system-ui, -apple-system, sans-serif">Build</text>

  <!-- Build chips row 1 -->
  <rect x="44" y="598" width="66" height="28" rx="6" fill="#FFFFFF" stroke="#E7EAF0" stroke-width="1"/>
  <text x="77" y="616" font-size="12" fill="#7B8799" font-family="system-ui, -apple-system, sans-serif" text-anchor="middle">Athletic</text>

  <rect x="118" y="598" width="76" height="28" rx="6" fill="#FFFFFF" stroke="#E7EAF0" stroke-width="1"/>
  <text x="156" y="616" font-size="12" fill="#7B8799" font-family="system-ui, -apple-system, sans-serif" text-anchor="middle">Curvaceous</text>

  <!-- Hourglass — SELECTED -->
  <rect x="202" y="598" width="72" height="28" rx="6" fill="#F2CC66" stroke="#F2CC66" stroke-width="1"/>
  <text x="238" y="616" font-size="12" font-weight="700" fill="#070A12" font-family="system-ui, -apple-system, sans-serif" text-anchor="middle">Hourglass</text>

  <rect x="282" y="598" width="66" height="28" rx="6" fill="#FFFFFF" stroke="#E7EAF0" stroke-width="1"/>
  <text x="315" y="616" font-size="12" fill="#7B8799" font-family="system-ui, -apple-system, sans-serif" text-anchor="middle">Heavyset</text>

  <!-- Build chips row 2 -->
  <rect x="44" y="634" width="60" height="28" rx="6" fill="#FFFFFF" stroke="#E7EAF0" stroke-width="1"/>
  <text x="74" y="652" font-size="12" fill="#7B8799" font-family="system-ui, -apple-system, sans-serif" text-anchor="middle">Average</text>

  <rect x="112" y="634" width="96" height="28" rx="6" fill="#FFFFFF" stroke="#E7EAF0" stroke-width="1"/>
  <text x="160" y="652" font-size="12" fill="#7B8799" font-family="system-ui, -apple-system, sans-serif" text-anchor="middle">Curvy Athletic</text>

  <!-- ══════════════════════════════════════ -->
  <!-- MARITAL STATUS section (partial)       -->
  <!-- ══════════════════════════════════════ -->
  <text x="28" y="714" font-size="12" font-weight="700" fill="#7B8799" font-family="system-ui, -apple-system, sans-serif" letter-spacing="0.5">MARITAL STATUS</text>

  <rect x="28" y="728" width="334" height="56" rx="12" fill="#F7F8FB" stroke="#E7EAF0" stroke-width="1"/>

  <!-- Never Married — SELECTED -->
  <rect x="44" y="740" width="96" height="28" rx="6" fill="#F2CC66" stroke="#F2CC66" stroke-width="1"/>
  <text x="92" y="758" font-size="12" font-weight="700" fill="#070A12" font-family="system-ui, -apple-system, sans-serif" text-anchor="middle">Never Married</text>

  <rect x="148" y="740" width="60" height="28" rx="6" fill="#FFFFFF" stroke="#E7EAF0" stroke-width="1"/>
  <text x="178" y="758" font-size="12" fill="#7B8799" font-family="system-ui, -apple-system, sans-serif" text-anchor="middle">Divorced</text>

  <rect x="216" y="740" width="58" height="28" rx="6" fill="#FFFFFF" stroke="#E7EAF0" stroke-width="1"/>
  <text x="245" y="758" font-size="12" fill="#7B8799" font-family="system-ui, -apple-system, sans-serif" text-anchor="middle">Widowed</text>

  <!-- Scroll fade -->
  <defs>
    <linearGradient id="fadeBottom2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F7F8FB" stop-opacity="0"/>
      <stop offset="100%" stop-color="#F7F8FB" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="762" width="390" height="28" fill="url(#fadeBottom2)"/>

  <!-- ── Footer ── -->
  <rect x="0" y="756" width="390" height="88" fill="#FFFFFF"/>
  <line x1="0" y1="756" x2="390" y2="756" stroke="#E7EAF0" stroke-width="1"/>

  <!-- Match count -->
  <text x="195" y="778" font-size="13" fill="#7B8799" font-family="system-ui, -apple-system, sans-serif" text-anchor="middle">17 profiles match your filters</text>

  <!-- Apply Filters button -->
  <rect x="28" y="788" width="334" height="48" rx="8" fill="#070A12"/>
  <text x="195" y="818" font-size="16" font-weight="700" fill="#F2CC66" font-family="system-ui, -apple-system, sans-serif" text-anchor="middle">Apply Filters</text>

  <!-- Home indicator -->
  <rect x="155" y="836" width="80" height="4" rx="2" fill="#070A12" fill-opacity="0.15"/>

</svg>
