<svg xmlns="http://www.w3.org/2000/svg" width="390" height="844" viewBox="0 0 390 844">
  <!-- Background -->
  <rect width="390" height="844" fill="#F7F8FB"/>

  <!-- Status bar -->
  <text x="24" y="22" font-size="12" font-weight="600" fill="#070A12" font-family="system-ui, -apple-system, sans-serif">9:41</text>
  <text x="352" y="22" font-size="12" fill="#070A12" font-family="system-ui, -apple-system, sans-serif" text-anchor="end">●●● ▲ 100%</text>

  <!-- OnboardingProgress (4 steps: Payment, Profile, Masjid, Reference) -->
  <!-- Step widths: 4 steps across 390px with 28px padding each side = 334px total -->
  <!-- Each stepWrapper is 334/4 = 83.5px wide, centered -->

  <!-- Step 1: Payment (completed) -->
  <!-- Left connector: none -->
  <!-- Circle (gold, completed) -->
  <circle cx="62" cy="70" r="14" fill="#F2CC66" stroke="#F2CC66" stroke-width="2"/>
  <text x="62" y="75" font-size="12" font-weight="700" fill="#070A12" font-family="system-ui" text-anchor="middle">✓</text>
  <!-- Right connector line (gold, completed) -->
  <rect x="76" y="69" width="41" height="2" fill="#F2CC66"/>
  <!-- Label -->
  <text x="62" y="96" font-size="11" font-weight="400" fill="#F2CC66" font-family="system-ui" text-anchor="middle">Payment</text>

  <!-- Step 2: Profile (completed) -->
  <!-- Left connector (gold) -->
  <rect x="145" y="69" width="42" height="2" fill="#F2CC66"/>
  <!-- Circle (gold, completed) -->
  <circle cx="173" cy="70" r="14" fill="#F2CC66" stroke="#F2CC66" stroke-width="2"/>
  <text x="173" y="75" font-size="12" font-weight="700" fill="#070A12" font-family="system-ui" text-anchor="middle">✓</text>
  <!-- Right connector (gold) -->
  <rect x="187" y="69" width="42" height="2" fill="#F2CC66"/>
  <!-- Label -->
  <text x="173" y="96" font-size="11" font-weight="400" fill="#F2CC66" font-family="system-ui" text-anchor="middle">Profile</text>

  <!-- Step 3: Masjid (active) -->
  <!-- Left connector (gold) -->
  <rect x="229" y="69" width="41" height="2" fill="#F2CC66"/>
  <!-- Circle (gold, active) -->
  <circle cx="284" cy="70" r="14" fill="#F2CC66" stroke="#F2CC66" stroke-width="2"/>
  <text x="284" y="75" font-size="12" font-weight="700" fill="#070A12" font-family="system-ui" text-anchor="middle">3</text>
  <!-- Right connector (gray) -->
  <rect x="298" y="69" width="41" height="2" fill="#E7EAF0"/>
  <!-- Label -->
  <text x="284" y="96" font-size="11" font-weight="600" fill="#070A12" font-family="system-ui" text-anchor="middle">Masjid</text>

  <!-- Step 4: Reference (inactive) -->
  <!-- Left connector (gray) -->
  <rect x="339" y="69" width="9" height="2" fill="#E7EAF0"/>
  <!-- Circle (gray) -->
  <circle cx="353" cy="70" r="14" fill="#F7F8FB" stroke="#E7EAF0" stroke-width="2"/>
  <text x="353" y="75" font-size="12" font-weight="600" fill="#7B8799" font-family="system-ui" text-anchor="middle">4</text>
  <!-- Label -->
  <text x="353" y="96" font-size="11" font-weight="400" fill="#7B8799" font-family="system-ui" text-anchor="middle">Reference</text>

  <!-- Title -->
  <text x="28" y="140" font-size="32" font-weight="700" font-style="italic" fill="#070A12" font-family="Georgia, 'Times New Roman', serif">Masjid Affiliation</text>

  <!-- Subtitle -->
  <text x="28" y="168" font-size="16" fill="#7B8799" font-family="system-ui, -apple-system, sans-serif">Are you a regular attendee at a Salafi masjid?</text>

  <!-- Option: Yes (selected) -->
  <rect x="28" y="200" width="334" height="64" rx="12" fill="#FFF9E6" stroke="#F2CC66" stroke-width="2"/>
  <!-- Radio selected -->
  <circle cx="56" cy="232" r="12" fill="#F7F8FB" stroke="#F2CC66" stroke-width="2"/>
  <circle cx="56" cy="232" r="6" fill="#F2CC66"/>
  <text x="78" y="237" font-size="16" font-weight="600" fill="#070A12" font-family="system-ui, -apple-system, sans-serif">Yes, I regularly attend a masjid</text>

  <!-- Option: No (unselected) -->
  <rect x="28" y="276" width="334" height="64" rx="12" fill="#FFFFFF" stroke="#E7EAF0" stroke-width="2"/>
  <!-- Radio unselected -->
  <circle cx="56" cy="308" r="12" fill="#F7F8FB" stroke="#E7EAF0" stroke-width="2"/>
  <text x="78" y="313" font-size="16" font-weight="600" fill="#070A12" font-family="system-ui, -apple-system, sans-serif">No, I don't regularly attend</text>

  <!-- Section title -->
  <text x="28" y="368" font-size="20" font-weight="600" font-style="italic" fill="#070A12" font-family="Georgia, 'Times New Roman', serif">Select Your Masjid</text>

  <!-- Search input -->
  <rect x="28" y="382" width="334" height="44" rx="8" fill="#FFFFFF" stroke="#E7EAF0" stroke-width="1"/>
  <text x="44" y="409" font-size="15" fill="#9CA3AF" font-family="system-ui, -apple-system, sans-serif">Search by name, city, or imam...</text>

  <!-- Masjid item 1 (selected) -->
  <rect x="28" y="442" width="334" height="88" rx="12" fill="#FFF9E6" stroke="#F2CC66" stroke-width="1"/>
  <text x="44" y="466" font-size="17" font-weight="600" font-style="italic" fill="#070A12" font-family="Georgia, 'Times New Roman', serif">Masjid Sunnah Nelson</text>
  <text x="44" y="486" font-size="14" fill="#7B8799" font-family="system-ui, -apple-system, sans-serif">📍 Brunswick Street, Nelson, Lancashire BB9 9AR</text>
  <text x="44" y="502" font-size="13" fill="#7B8799" font-family="system-ui, -apple-system, sans-serif">Imam: Abul 'Abbas Naveed Ayaaz</text>
  <!-- Checkmark circle -->
  <circle cx="338" cy="486" r="16" fill="#F2CC66"/>
  <text x="338" y="492" font-size="16" font-weight="700" fill="#070A12" font-family="system-ui" text-anchor="middle">✓</text>

  <!-- Masjid item 2 (unselected) -->
  <rect x="28" y="542" width="334" height="88" rx="12" fill="#FFFFFF" stroke="#E7EAF0" stroke-width="1"/>
  <text x="44" y="566" font-size="17" font-weight="600" font-style="italic" fill="#070A12" font-family="Georgia, 'Times New Roman', serif">Masjid Example One</text>
  <text x="44" y="586" font-size="14" fill="#7B8799" font-family="system-ui, -apple-system, sans-serif">📍 1 Demo Street, Manchester M1 0AA</text>
  <text x="44" y="602" font-size="13" fill="#7B8799" font-family="system-ui, -apple-system, sans-serif">Imam: Imam Name Here</text>

  <!-- Masjid item 3 (unselected, partial) -->
  <rect x="28" y="642" width="334" height="88" rx="12" fill="#FFFFFF" stroke="#E7EAF0" stroke-width="1"/>
  <text x="44" y="666" font-size="17" font-weight="600" font-style="italic" fill="#070A12" font-family="Georgia, 'Times New Roman', serif">Masjid Example Two</text>
  <text x="44" y="686" font-size="14" fill="#7B8799" font-family="system-ui, -apple-system, sans-serif">📍 2 Demo Street, Bradford BD1 0AA</text>
  <text x="44" y="702" font-size="13" fill="#7B8799" font-family="system-ui, -apple-system, sans-serif">Imam: Imam Name Here</text>

  <!-- Scroll fade before bottom bar -->
  <defs>
    <linearGradient id="fadeUp" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F7F8FB" stop-opacity="0"/>
      <stop offset="100%" stop-color="#F7F8FB" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="720" width="390" height="44" fill="url(#fadeUp)"/>

  <!-- Bottom bar -->
  <rect x="0" y="748" width="390" height="96" fill="#FFFFFF"/>
  <line x1="0" y1="748" x2="390" y2="748" stroke="#E7EAF0" stroke-width="1"/>

  <!-- Continue button -->
  <rect x="28" y="764" width="334" height="52" rx="8" fill="#F2CC66"/>
  <!-- Button shadow suggestion -->
  <text x="195" y="795" font-size="16" font-weight="700" font-style="italic" fill="#070A12" font-family="system-ui, -apple-system, sans-serif" text-anchor="middle">Continue</text>

  <!-- Home indicator -->
  <rect x="155" y="830" width="80" height="4" rx="2" fill="#070A12" fill-opacity="0.15"/>
</svg>
