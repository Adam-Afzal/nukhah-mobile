<svg xmlns="http://www.w3.org/2000/svg" width="390" height="844" viewBox="0 0 390 844">

  <!-- Screen background -->
  <rect width="390" height="844" fill="#FFFFFF"/>

  <!-- ── Status bar ── -->
  <text x="24" y="20" font-size="15" font-weight="600" fill="#000000" font-family="system-ui, -apple-system, sans-serif">9:41</text>
  <!-- Signal dots -->
  <circle cx="298" cy="14" r="3.5" fill="#000000"/>
  <circle cx="308" cy="14" r="3.5" fill="#000000"/>
  <circle cx="318" cy="14" r="3.5" fill="#000000"/>
  <!-- Wifi icon (simplified) -->
  <path d="M330 18 Q336 11 342 18" stroke="#000000" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M333 21 Q336 17 339 21" stroke="#000000" stroke-width="2" fill="none" stroke-linecap="round"/>
  <circle cx="336" cy="23" r="1.5" fill="#000000"/>
  <!-- Battery -->
  <rect x="348" y="9" width="25" height="13" rx="3" stroke="#000000" stroke-width="1.2" fill="none"/>
  <rect x="373" y="13" width="2.5" height="5" rx="1" fill="#000000" fill-opacity="0.4"/>
  <rect x="349.5" y="10.5" width="19" height="10" rx="2" fill="#000000"/>

  <!-- ── Navigation bar ── -->
  <rect x="0" y="44" width="390" height="52" fill="#F9F9F9"/>
  <line x1="0" y1="96" x2="390" y2="96" stroke="#C6C6C8" stroke-width="0.5"/>

  <!-- Back chevron + "Messages" -->
  <path d="M18 70 L11 77 L18 84" stroke="#007AFF" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="26" y="79" font-size="17" fill="#007AFF" font-family="system-ui, -apple-system, sans-serif">Messages</text>

  <!-- Contact avatar -->
  <circle cx="195" cy="66" r="18" fill="#E8E8ED"/>
  <text x="195" y="71" font-size="14" font-weight="600" fill="#8E8E93" font-family="system-ui" text-anchor="middle">M</text>

  <!-- Contact name below avatar -->
  <text x="195" y="90" font-size="11" fill="#000000" font-family="system-ui, -apple-system, sans-serif" text-anchor="middle">Mithaq</text>

  <!-- Video icon (right side) -->
  <path d="M358 62 L370 56 L370 76 L358 70 Z" fill="#007AFF"/>
  <rect x="346" y="58" width="14" height="16" rx="3" fill="#007AFF"/>

  <!-- ── Messages area ── -->

  <!-- Today header -->
  <text x="195" y="124" font-size="12" fill="#8E8E93" font-family="system-ui, -apple-system, sans-serif" text-anchor="middle">Today 9:41 AM</text>

  <!-- "Text Message" label above bubble -->
  <text x="24" y="148" font-size="11" fill="#8E8E93" font-family="system-ui, -apple-system, sans-serif">Text Message</text>

  <!-- ── Received message bubble ── -->
  <!-- Bubble shape -->
  <rect x="16" y="156" width="296" height="292" rx="18" fill="#E8E8ED"/>
  <!-- Bubble tail (bottom-left) -->
  <path d="M16 428 Q8 440 6 448 Q14 438 28 432 Z" fill="#E8E8ED"/>

  <!-- Message text (font-size 15, lineHeight ~21) -->
  <!-- Greeting -->
  <text x="30" y="182" font-size="15" fill="#000000" font-family="system-ui, -apple-system, sans-serif">Assalamu Alaykum</text>

  <!-- Body -->
  <text x="30" y="232" font-size="15" fill="#000000" font-family="system-ui, -apple-system, sans-serif">Bint Khalid has affiliated</text>
  <text x="30" y="253" font-size="15" fill="#000000" font-family="system-ui, -apple-system, sans-serif">themselves with Masjid Sunnah</text>
  <text x="30" y="274" font-size="15" fill="#000000" font-family="system-ui, -apple-system, sans-serif">Nelson. Can you confirm</text>
  <text x="30" y="295" font-size="15" fill="#000000" font-family="system-ui, -apple-system, sans-serif">knowledge of this person?</text>

  <!-- Wali info -->
  <text x="30" y="324" font-size="15" fill="#000000" font-family="system-ui, -apple-system, sans-serif">Wali: Khalid Al-Rashid (Father),</text>
  <text x="30" y="345" font-size="15" fill="#000000" font-family="system-ui, -apple-system, sans-serif">+44 7700 900 123</text>

  <!-- Reply instruction -->
  <text x="30" y="374" font-size="15" fill="#000000" font-family="system-ui, -apple-system, sans-serif">Reply YES to confirm or NO if</text>
  <text x="30" y="395" font-size="15" fill="#000000" font-family="system-ui, -apple-system, sans-serif">you cannot confirm.</text>

  <!-- Closing -->
  <text x="30" y="424" font-size="15" fill="#000000" font-family="system-ui, -apple-system, sans-serif">JazakAllahu Khairan</text>

  <!-- ── Delivered label ── -->
  <text x="312" y="468" font-size="11" fill="#8E8E93" font-family="system-ui, -apple-system, sans-serif" text-anchor="end">Delivered</text>

  <!-- ── Message input bar ── -->
  <rect x="0" y="780" width="390" height="64" fill="#F9F9F9"/>
  <line x1="0" y1="780" x2="390" y2="780" stroke="#C6C6C8" stroke-width="0.5"/>

  <!-- Apps icon (left) -->
  <circle cx="28" cy="812" r="15" fill="none" stroke="#007AFF" stroke-width="1.5"/>
  <text x="28" y="817" font-size="16" fill="#007AFF" font-family="system-ui" text-anchor="middle">+</text>

  <!-- Text input field -->
  <rect x="52" y="798" width="278" height="28" rx="14" fill="#FFFFFF" stroke="#C6C6C8" stroke-width="1"/>
  <text x="68" y="816" font-size="14" fill="#C7C7CC" font-family="system-ui, -apple-system, sans-serif">iMessage</text>

  <!-- Audio/send button (right) -->
  <circle cx="356" cy="812" r="14" fill="#007AFF"/>
  <!-- Waveform icon inside -->
  <rect x="349" y="807" width="2" height="10" rx="1" fill="#FFFFFF"/>
  <rect x="353" y="805" width="2" height="14" rx="1" fill="#FFFFFF"/>
  <rect x="357" y="808" width="2" height="8" rx="1" fill="#FFFFFF"/>
  <rect x="361" y="806" width="2" height="12" rx="1" fill="#FFFFFF"/>

  <!-- Home indicator -->
  <rect x="155" y="832" width="80" height="4" rx="2" fill="#000000" fill-opacity="0.18"/>

</svg>
