  <rect x="44" y="674" width="96" height="28" rx="6" fill="#F2CC66" stroke="#F2CC66" stroke-width="1"/>
  <text x="92" y="692" font-size="12" font-weight="700" fill="#070A12" font-family="system-ui, -apple-system, sans-serif" text-anchor="middle">Never Married</text>
  <rect x="148" y="674" width="60" height="28" rx="6" fill="#FFFFFF" stroke="#E7EAF0" stroke-width="1"/>
  <text x="178" y="692" font-size="12" fill="#7B8799" font-family="system-ui, -apple-system, sans-serif" text-anchor="middle">Divorced</text>
  <rect x="216" y="674" width="58" height="28" rx="6" fill="#FFFFFF" stroke="#E7EAF0" stroke-width="1"/>
  <text x="245" y="692" font-size="12" fill="#7B8799" font-family="system-ui, -apple-system, sans-serif" text-anchor="middle">Widowed</text>

  <!-- ══════════════════════════════════════ -->
  <!-- VERIFICATION (visible to both views)   -->
  <!-- ══════════════════════════════════════ -->
  <text x="28" y="742" font-size="12" font-weight="700" fill="#7B8799" font-family="system-ui, -apple-system, sans-serif" letter-spacing="0.5">VERIFICATION</text>
  <rect x="28" y="756" width="334" height="120" rx="12" fill="#F7F8FB" stroke="#E7EAF0" stroke-width="1"/>
  <text x="44" y="780" font-size="13" font-weight="700" fill="#070A12" font-family="system-ui, -apple-system, sans-serif">Masjid</text>
  <rect x="44" y="788" width="294" height="36" rx="8" fill="#FFFFFF" stroke="#E7EAF0" stroke-width="1"/>
  <text x="60" y="810" font-size="15" fill="#C0C7D1" font-family="system-ui, -apple-system, sans-serif">Search by masjid name...</text>

  <!-- Scroll fade -->
  <rect x="0" y="722" width="390" height="40" fill="url(#fadeSister)"/>

  <!-- ── Footer ── -->
  <rect x="0" y="756" width="390" height="88" fill="#FFFFFF"/>
  <line x1="0" y1="756" x2="390" y2="756" stroke="#E7EAF0" stroke-width="1"/>
  <text x="195" y="778" font-size="13" fill="#7B8799" font-family="system-ui, -apple-system, sans-serif" text-anchor="middle">23 profiles match your filters</text>
  <rect x="28" y="788" width="334" height="48" rx="8" fill="#070A12"/>
  <text x="195" y="818" font-size="16" font-weight="700" fill="#F2CC66" font-family="system-ui, -apple-system, sans-serif" text-anchor="middle">Apply Filters</text>

  <!-- Home indicator -->
  <rect x="155" y="836" width="80" height="4" rx="2" fill="#070A12" fill-opacity="0.15"/>

</svg>
