  <circle cx="351" cy="581" r="3.5" fill="#F2CC66"/>
  <!-- Hijab — not selected -->
  <text x="44" y="606" font-size="15" fill="#C0C7D1" font-family="system-ui, -apple-system, sans-serif">Hijab</text>
  <!-- Open Hair — not selected -->
  <text x="44" y="606" font-size="15" fill="#C0C7D1" font-family="system-ui, -apple-system, sans-serif">Hijab</text>

