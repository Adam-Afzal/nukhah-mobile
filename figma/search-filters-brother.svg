  <text x="62" y="228" font-size="14" font-weight="700" fill="#F2CC66" font-family="system-ui, -apple-system, sans-serif">Clear All</text>

  <!-- ══════════════════════════════════════ -->
  <!-- LOCATION                               -->
  <!-- ══════════════════════════════════════ -->
  <text x="28" y="260" font-size="12" font-weight="700" fill="#7B8799" font-family="system-ui, -apple-system, sans-serif" letter-spacing="0.5">LOCATION</text>
  <rect x="28" y="274" width="334" height="90" rx="12" fill="#F7F8FB" stroke="#E7EAF0" stroke-width="1"/>
  <text x="44" y="298" font-size="13" font-weight="700" fill="#070A12" font-family="system-ui, -apple-system, sans-serif">Country</text>
  <!-- UK selected -->
