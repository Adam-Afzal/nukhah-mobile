  <rect x="44" y="404" width="90" height="34" rx="8" fill="#FFFFFF" stroke="#E7EAF0" stroke-width="2"/>
  <text x="89" y="425" font-size="13" fill="#070A12" font-family="system-ui, -apple-system, sans-serif" text-anchor="middle">🇸🇦 Arab - Gulf</text>
  <rect x="142" y="404" width="78" height="34" rx="8" fill="#FFFFFF" stroke="#E7EAF0" stroke-width="2"/>
  <text x="181" y="425" font-size="13" fill="#070A12" font-family="system-ui, -apple-system, sans-serif" text-anchor="middle">🇵🇰 Pakistani</text>
  <rect x="228" y="404" width="86" height="34" rx="8" fill="#FFFFFF" stroke="#E7EAF0" stroke-width="2"/>
  <text x="271" y="425" font-size="13" fill="#070A12" font-family="system-ui, -apple-system, sans-serif" text-anchor="middle">🇧🇩 Bangladeshi</text>
  <!-- Row 2 -->
  <rect x="44" y="444" width="88" height="34" rx="8" fill="#FFFFFF" stroke="#E7EAF0" stroke-width="2"/>
  <text x="88" y="465" font-size="13" fill="#070A12" font-family="system-ui, -apple-system, sans-serif" text-anchor="middle">🇰🇪 East African</text>
  <rect x="140" y="444" width="56" height="34" rx="8" fill="#FFFFFF" stroke="#E7EAF0" stroke-width="2"/>
  <text x="168" y="465" font-size="13" fill="#070A12" font-family="system-ui, -apple-system, sans-serif" text-anchor="middle">🇹🇷 Turkish</text>
  <rect x="204" y="444" width="60" height="34" rx="8" fill="#FFFFFF" stroke="#E7EAF0" stroke-width="2"/>
  <text x="234" y="465" font-size="13" fill="#070A12" font-family="system-ui, -apple-system, sans-serif" text-anchor="middle">🇬🇧 White</text>

  <!-- ══════════════════════════════════════ -->
  <!-- PHYSICAL ATTRIBUTES                    -->
  <!-- (brother builds only — no hijab/poly) -->
  <!-- ══════════════════════════════════════ -->
