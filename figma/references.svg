<svg xmlns="http://www.w3.org/2000/svg" width="390" height="844" viewBox="0 0 390 844">
  <defs>
    <linearGradient id="fadeScroll" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F7F8FB" stop-opacity="0"/>
      <stop offset="100%" stop-color="#F7F8FB" stop-opacity="1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="390" height="844" fill="#F7F8FB"/>

  <!-- Status bar -->
  <text x="24" y="22" font-size="12" font-weight="600" fill="#070A12" font-family="system-ui, -apple-system, sans-serif">9:41</text>
  <text x="352" y="22" font-size="12" fill="#070A12" font-family="system-ui, -apple-system, sans-serif" text-anchor="end">●●● ▲ 100%</text>

  <!-- OnboardingProgress: step 4 active, steps 1–3 completed -->
  <!-- Step centers at x: 70, 153, 237, 320 — circles at y=70 -->

  <!-- Connector lines (all gold — steps 1–3 done) -->
  <rect x="84"  y="69" width="55" height="2" fill="#F2CC66"/>
  <rect x="167" y="69" width="56" height="2" fill="#F2CC66"/>
  <rect x="251" y="69" width="55" height="2" fill="#F2CC66"/>

  <!-- Step 1: Payment (completed) -->
  <circle cx="70" cy="70" r="14" fill="#F2CC66" stroke="#F2CC66" stroke-width="2"/>
  <text x="70" y="75" font-size="12" font-weight="700" fill="#070A12" font-family="system-ui" text-anchor="middle">✓</text>
  <text x="70" y="96" font-size="11" fill="#F2CC66" font-family="system-ui" text-anchor="middle">Payment</text>

  <!-- Step 2: Profile (completed) -->
  <circle cx="153" cy="70" r="14" fill="#F2CC66" stroke="#F2CC66" stroke-width="2"/>
  <text x="153" y="75" font-size="12" font-weight="700" fill="#070A12" font-family="system-ui" text-anchor="middle">✓</text>
  <text x="153" y="96" font-size="11" fill="#F2CC66" font-family="system-ui" text-anchor="middle">Profile</text>

  <!-- Step 3: Masjid (completed) -->
  <circle cx="237" cy="70" r="14" fill="#F2CC66" stroke="#F2CC66" stroke-width="2"/>
  <text x="237" y="75" font-size="12" font-weight="700" fill="#070A12" font-family="system-ui" text-anchor="middle">✓</text>
  <text x="237" y="96" font-size="11" fill="#F2CC66" font-family="system-ui" text-anchor="middle">Masjid</text>

  <!-- Step 4: Reference (active) -->
  <circle cx="320" cy="70" r="14" fill="#F2CC66" stroke="#F2CC66" stroke-width="2"/>
  <text x="320" y="75" font-size="12" font-weight="700" fill="#070A12" font-family="system-ui" text-anchor="middle">4</text>
  <text x="320" y="96" font-size="11" font-weight="600" fill="#070A12" font-family="system-ui" text-anchor="middle">Reference</text>

  <!-- Title -->
  <text x="28" y="152" font-size="32" font-weight="700" font-style="italic" fill="#070A12" font-family="Georgia, 'Times New Roman', serif">Character Reference</text>

  <!-- Subtitle (2 lines) -->
  <text x="28" y="178" font-size="16" fill="#7B8799" font-family="system-ui, -apple-system, sans-serif">Your imam will verify your masjid affiliation.</text>
  <text x="28" y="202" font-size="16" fill="#7B8799" font-family="system-ui, -apple-system, sans-serif">Please provide 1 additional character reference:</text>

  <!-- Imam Reference Card (gold, auto-included) -->
  <rect x="28" y="232" width="334" height="118" rx="12" fill="#FFF9E6" stroke="#F2CC66" stroke-width="1"/>

  <!-- Card header row: title + badge -->
  <text x="48" y="260" font-size="18" font-weight="600" font-style="italic" fill="#070A12" font-family="Georgia, 'Times New Roman', serif">🕌 Masjid Affiliation</text>
  <!-- Auto-included badge -->
  <rect x="264" y="245" width="84" height="22" rx="11" fill="#F2CC66"/>
  <text x="306" y="260" font-size="10" font-weight="600" font-style="italic" fill="#070A12" font-family="system-ui, -apple-system, sans-serif" text-anchor="middle">Auto-included</text>

  <!-- Imam details -->
  <text x="48" y="294" font-size="15" font-weight="600" fill="#070A12" font-family="system-ui, -apple-system, sans-serif">Abul 'Abbas Naveed Ayaaz</text>
  <text x="48" y="313" font-size="14" fill="#7B8799" font-family="system-ui, -apple-system, sans-serif">Masjid Sunnah Nelson</text>
  <text x="48" y="336" font-size="13" fill="#F2994A" font-family="system-ui, -apple-system, sans-serif">⏳ Pending imam verification</text>

  <!-- Your Reference Card (white) -->
  <rect x="28" y="374" width="334" height="442" rx="12" fill="#FFFFFF" stroke="#E7EAF0" stroke-width="1"/>

  <!-- Card title -->
  <text x="48" y="406" font-size="18" font-weight="600" font-style="italic" fill="#070A12" font-family="Georgia, 'Times New Roman', serif">Your Reference</text>

  <!-- Full Name -->
  <text x="48" y="440" font-size="14" font-weight="600" fill="#070A12" font-family="system-ui, -apple-system, sans-serif">Full Name *</text>
  <rect x="48" y="454" width="294" height="44" rx="8" fill="#FFFFFF" stroke="#E7EAF0" stroke-width="1"/>
  <text x="64" y="481" font-size="15" fill="#9CA3AF" font-family="system-ui, -apple-system, sans-serif">e.g., Uncle Yusuf Ahmed</text>

  <!-- Relationship -->
  <text x="48" y="524" font-size="14" font-weight="600" fill="#070A12" font-family="system-ui, -apple-system, sans-serif">Relationship *</text>
  <rect x="48" y="538" width="294" height="44" rx="8" fill="#FFFFFF" stroke="#E7EAF0" stroke-width="1"/>
  <text x="64" y="565" font-size="15" fill="#9CA3AF" font-family="system-ui, -apple-system, sans-serif">Select relationship...</text>
  <!-- Dropdown arrow -->
  <text x="334" y="567" font-size="20" fill="#9CA3AF" font-family="system-ui" text-anchor="end">›</text>

  <!-- Phone Number -->
  <text x="48" y="608" font-size="14" font-weight="600" fill="#070A12" font-family="system-ui, -apple-system, sans-serif">Phone Number *</text>
  <rect x="48" y="622" width="294" height="44" rx="8" fill="#FFFFFF" stroke="#E7EAF0" stroke-width="1"/>
  <text x="64" y="649" font-size="15" fill="#9CA3AF" font-family="system-ui, -apple-system, sans-serif">+44 20 1234 5678</text>
  <text x="48" y="679" font-size="12" fill="#7B8799" font-family="system-ui, -apple-system, sans-serif">They will receive an SMS with a verification code</text>

  <!-- Email (Optional) — partially visible before fade -->
  <text x="48" y="715" font-size="14" font-weight="600" fill="#070A12" font-family="system-ui, -apple-system, sans-serif">Email (Optional)</text>
  <rect x="48" y="729" width="294" height="44" rx="8" fill="#FFFFFF" stroke="#E7EAF0" stroke-width="1"/>
  <text x="64" y="756" font-size="15" fill="#9CA3AF" font-family="system-ui, -apple-system, sans-serif">reference@email.com</text>

  <!-- Scroll fade before bottom bar -->
  <rect x="0" y="716" width="390" height="44" fill="url(#fadeScroll)"/>

  <!-- Bottom bar -->
  <rect x="0" y="748" width="390" height="96" fill="#FFFFFF"/>
  <line x1="0" y1="748" x2="390" y2="748" stroke="#E7EAF0" stroke-width="1"/>

  <!-- Send Verification Code button -->
  <rect x="28" y="762" width="334" height="52" rx="8" fill="#F2CC66"/>
  <text x="195" y="793" font-size="16" font-weight="700" font-style="italic" fill="#070A12" font-family="system-ui, -apple-system, sans-serif" text-anchor="middle">Send Verification Code</text>

  <!-- Skip for now -->
  <text x="195" y="828" font-size="14" fill="#7B8799" font-family="system-ui, -apple-system, sans-serif" text-anchor="middle">Skip for now</text>

  <!-- Home indicator -->
  <rect x="155" y="836" width="80" height="4" rx="2" fill="#070A12" fill-opacity="0.15"/>
</svg>
