  <rect x="44" y="558" width="52" height="28" rx="6" fill="#FFFFFF" stroke="#E7EAF0" stroke-width="1"/>
  <text x="70" y="576" font-size="12" fill="#7B8799" font-family="system-ui, -apple-system, sans-serif" text-anchor="middle">Lean</text>

  <!-- Muscular — SELECTED -->
  <rect x="104" y="558" width="72" height="28" rx="6" fill="#F2CC66" stroke="#F2CC66" stroke-width="1"/>
  <text x="140" y="576" font-size="12" font-weight="700" fill="#070A12" font-family="system-ui, -apple-system, sans-serif" text-anchor="middle">Muscular</text>

  <rect x="184" y="558" width="48" height="28" rx="6" fill="#FFFFFF" stroke="#E7EAF0" stroke-width="1"/>
  <text x="208" y="576" font-size="12" fill="#7B8799" font-family="system-ui, -apple-system, sans-serif" text-anchor="middle">Bulky</text>

  <!-- Row 2: Heavyset | Average -->
  <rect x="44" y="594" width="66" height="28" rx="6" fill="#FFFFFF" stroke="#E7EAF0" stroke-width="1"/>
  <text x="77" y="612" font-size="12" fill="#7B8799" font-family="system-ui, -apple-system, sans-serif" text-anchor="middle">Heavyset</text>
  <rect x="118" y="594" width="60" height="28" rx="6" fill="#FFFFFF" stroke="#E7EAF0" stroke-width="1"/>
  <text x="148" y="612" font-size="12" fill="#7B8799" font-family="system-ui, -apple-system, sans-serif" text-anchor="middle">Average</text>

  <!-- ══════════════════════════════════════ -->
  <!-- MARITAL STATUS                         -->
  <!-- ══════════════════════════════════════ -->
  <text x="28" y="648" font-size="12" font-weight="700" fill="#7B8799" font-family="system-ui, -apple-system, sans-serif" letter-spacing="0.5">MARITAL STATUS</text>
  <rect x="28" y="662" width="334" height="56" rx="12" fill="#F7F8FB" stroke="#E7EAF0" stroke-width="1"/>

